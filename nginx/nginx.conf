upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name buyzenix.com www.buyzenix.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name buyzenix.com www.buyzenix.com localhost 127.0.0.1;

    ssl_certificate /etc/letsencrypt/live/buyzenix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buyzenix.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
