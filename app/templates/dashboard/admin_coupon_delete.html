{% extends "dashboard/base_dashboard.html" %}
{% block dash_title %}Delete Coupon{% endblock %}
{% block dash_heading %}Delete Coupon{% endblock %}

{% block dash_content %}
<div class="card" style="max-width:500px">
  <div class="card-body" style="text-align:center;padding:2rem">
    <p style="font-size:1.1rem;margin-bottom:1.5rem">Are you sure you want to delete coupon <strong style="font-family:monospace">{{ coupon.code }}</strong>?</p>
    <form method="post" style="display:flex;gap:.5rem;justify-content:center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'dashboard:admin_coupons' %}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
