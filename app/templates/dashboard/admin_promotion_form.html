{% extends "dashboard/base_dashboard.html" %}
{% block dash_title %}{{ action }} Promotion{% endblock %}
{% block dash_heading %}{{ action }} Promotion{% endblock %}

{% block dash_content %}
<div style="max-width:700px">
  <form method="post">
    {% csrf_token %}
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px">
      <h3 style="font-size:.9rem;font-weight:700;margin-bottom:16px">Promotion Content</h3>

      <div style="margin-bottom:12px">
        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Title *</label>
        <input type="text" name="title" value="{% if promo %}{{ promo.title }}{% endif %}" required
          style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem" placeholder="Eid Special Offer" />
      </div>

      <div style="margin-bottom:12px">
        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Subtitle</label>
        <input type="text" name="subtitle" value="{% if promo %}{{ promo.subtitle }}{% endif %}"
          style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem" placeholder="Limited time offer on selected items" />
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Discount Text</label>
          <input type="text" name="discount_text" value="{% if promo %}{{ promo.discount_text }}{% endif %}"
            style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem" placeholder="30% OFF" />
        </div>
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Featured Product</label>
          <select name="product" style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.85rem">
            <option value="">None</option>
            {% for p in products %}
            <option value="{{ p.id }}" {% if promo and promo.product and promo.product.id == p.id %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Position</label>
          <select name="position" style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.85rem">
            <option value="hero_left" {% if promo and promo.position == "hero_left" %}selected{% endif %}>Hero Left</option>
            <option value="hero_right" {% if promo and promo.position == "hero_right" %}selected{% endif %}>Hero Right</option>
            <option value="below_hero" {% if promo and promo.position == "below_hero" %}selected{% endif %}>Below Hero</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">BG Color</label>
          <input type="color" name="bg_color" value="{% if promo %}{{ promo.bg_color }}{% else %}#4f46e5{% endif %}"
            style="width:100%;height:38px;border:1.5px solid #d1d5db;border-radius:8px;cursor:pointer" />
        </div>
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Text Color</label>
          <input type="color" name="text_color" value="{% if promo %}{{ promo.text_color }}{% else %}#ffffff{% endif %}"
            style="width:100%;height:38px;border:1.5px solid #d1d5db;border-radius:8px;cursor:pointer" />
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Button Text</label>
          <input type="text" name="button_text" value="{% if promo %}{{ promo.button_text }}{% endif %}"
            style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem" placeholder="Shop Now" />
        </div>
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Button URL</label>
          <input type="text" name="button_url" value="{% if promo %}{{ promo.button_url }}{% endif %}"
            style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem" placeholder="/products/" />
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:4px">Order</label>
          <input type="number" name="order" value="{% if promo %}{{ promo.order }}{% else %}0{% endif %}"
            style="width:100%;border:1.5px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.9rem" />
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:4px">
          <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;cursor:pointer">
            <input type="checkbox" name="is_active" {% if not promo or promo.is_active %}checked{% endif %}
              style="width:16px;height:16px;accent-color:#2563eb" />
            Active
          </label>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:8px">
      <button type="submit" style="background:#2563eb;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-weight:600;cursor:pointer">{{ action }} Promotion</button>
      <a href="{% url 'dashboard:admin_promotions' %}" style="color:#6b7280;padding:9px 20px;font-weight:600;text-decoration:none">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
