{% extends "dashboard/base_dashboard.html" %}
{% block dash_title %}{{ action }} Coupon{% endblock %}
{% block dash_heading %}{{ action }} Coupon{% endblock %}

{% block dash_content %}
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Coupon Code *</label>
        <input type="text" name="code" class="form-input" value="{{ coupon.code|default:'' }}" required placeholder="e.g. SAVE20" style="font-family:monospace;text-transform:uppercase" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" name="description" class="form-input" value="{{ coupon.description|default:'' }}" placeholder="e.g. 20% off on all products" />
      </div>
      <div class="form-group">
        <label>Discount Type *</label>
        <select name="discount_type" class="form-input">
          <option value="percent" {% if coupon.discount_type == 'percent' %}selected{% endif %}>Percentage (%)</option>
          <option value="fixed" {% if coupon.discount_type == 'fixed' %}selected{% endif %}>Fixed Amount</option>
        </select>
      </div>
      <div class="form-group">
        <label>Discount Value *</label>
        <input type="number" name="discount_value" class="form-input" value="{{ coupon.discount_value|default:'' }}" step="0.01" min="0" required />
      </div>
      <div class="form-group">
        <label>Minimum Order Amount</label>
        <input type="number" name="min_order_amount" class="form-input" value="{{ coupon.min_order_amount|default:'0' }}" step="0.01" min="0" />
      </div>
      <div class="form-group">
        <label>Max Uses (0 = unlimited)</label>
        <input type="number" name="max_uses" class="form-input" value="{{ coupon.max_uses|default:'0' }}" min="0" />
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:.5rem">
        <input type="checkbox" name="is_active" id="id_active" class="form-check" checked />
        <label for="id_active" style="margin:0;font-weight:600">Active</label>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1.5rem">
        <button type="submit" class="btn btn-primary">{{ action }} Coupon</button>
        <a href="{% url 'dashboard:admin_coupons' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
