{% extends "base.html" %}
{% load static %}

{% block title %}Log in | BuyZenix{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="form-wrap">
      <div class="form-card">
        <h2>Welcome back</h2>
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="form-grid">
            <div class="field full">
              <label for="id_username">Username</label>
              <input type="text" name="username" id="id_username" required />
            </div>
            <div class="field full">
              <label for="id_password">Password</label>
              <input type="password" name="password" id="id_password" required />
            </div>
          </div>
          <button class="btn btn-primary btn-block" type="submit" style="margin-top:1.25rem">Log in</button>
        </form>
        <p style="margin-top:1.25rem;color:var(--text-muted);text-align:center">
          Don't have an account? <a href="{% url 'accounts:register' %}" style="color:var(--primary);font-weight:600">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
